<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Gallery - CSS Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="heading">Product Gallery</h1>

    <div class="grid-container">

        <!-- Laptop - spans 2 columns -->
        <div class="card laptop">
            <img src="https://png.pngtree.com/png-vector/20250304/ourmid/pngtree-sleek-modern-laptop-with-high-resolution-display-png-image_15711292.png" alt="Laptop">
            <h3>Laptop</h3>
            <p class="price">$799</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://png.pngtree.com/png-clipart/20250208/original/pngtree-realistic-camera-illustration-png-image_20387070.png" alt="Camera">
            <h3>Camera</h3>
            <p class="price">$349</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/050/177/034/small/smart-watch-isolated-on-transparent-background-png.png" alt="Watch">
            <h3>Watch</h3>
            <p class="price">$199</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card keyboard">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRsFu0l2Ckr23k5ldVqO-1VTBeSV3FxBjE7Wsf-IBhgIo6DukJOj4gVsVhk&s=10" alt="Keyboard">
            <h3>Keyboard</h3>
            <p class="price">$59</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card mouse">
            <img src="https://i.pinimg.com/736x/b1/ad/e7/b1ade7d0e476181b8c08d164522d7ac8.jpg" alt="Mouse">
            <h3>Mouse</h3>
            <p class="price">$29</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://beme.pk/cdn/shop/files/BEME_HUSH_ANC_Wireless_Headphones.jpg?v=1732973202" alt="Headphone">
            <h3>Headphone</h3>
            <p class="price">$89</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

    </div>
</body>
</html>
